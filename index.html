<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="./css/style.css">
  <title>Const</title>
</head>

<body>
  <div class="page">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="logo">Const</div>
      <nav class="nav">
        <span class="nav-item">首页</span>
        <span class="nav-item">关于</span>
      </nav>
    </header>

    <!-- 幻灯片容器 -->
    <div class="slides-container">
      <!-- 第1页 -->
      <section class="slide" id="slide-0">
        <div class="content">
          <h1 class="title">
            <span class="title-line">在理性与感性的</span>
            <span class="title-line">边界，寻找那束</span>
            <span class="title-line">恰到好处的光。</span>
          </h1>

          <p class="desc">在信息洪流中保持独立思考。</p>
        </div>
        <div class="right">
          <img src="./src/img1.jpg" alt="">
        </div>
      </section>

      <!-- 第2页 -->
      <section class="slide" id="slide-1">
        <div class="content">
          <div id="works-list" class="works"></div>
        </div>
        <div class="right">
          <img src="./src/04_flower.png" alt="">
        </div>
      </section>
    </div>
  </div>

  <!-- 装饰数字 -->
  <div class="number" id="slide-number">01</div>

  <!-- 滚动指示器 -->
  <div class="scroll-indicator">
    <span class="dot active" data-slide="0"></span>
    <span class="dot" data-slide="1"></span>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/main.js"></script>
</body>

</html>
