<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/concept.css">
  <title>Concept.</title>
</head>
<body class="concept-light">
  <header class="nav-header">
    <a href="../index.html" class="logo">Const</a>
    <nav class="nav-links">
      <a href="../index.html" class="nav-link">Index</a>
      <span class="nav-link active">Concept.</span>
    </nav>
  </header>

  <main class="concept-page">
    <header class="concept-header">
      <h1 class="concept-title">Concept.</h1>
      <p class="concept-sub">视觉实验 / 交互探索 / 想法碎片</p>
    </header>

    <div class="concept-grid" id="concept-grid">
      <div class="empty-state">No content yet...</div>
    </div>
  </main>

  <script src="../js/concept-data.js"></script>
  <script>
    const grid = document.getElementById('concept-grid');
    let currentAudio = null;
    let currentIndex = -1;
    let audioContext = null;
    let analyzer = null;
    let animationId = null;

    function renderCards() {
      if (CONCEPT_DATA.length === 0) {
        grid.innerHTML = '<div class="empty-state">No content yet...</div>';
        return;
      }

      grid.innerHTML = CONCEPT_DATA.map((item, index) => `
        <div class="concept-card music-card" data-index="${index}" data-audio="${item.audio}">
          <div class="music-info">
            <div class="card-type">${item.type}</div>
            <div class="card-title">${item.title}</div>
            ${item.desc ? `<div class="card-desc">${item.desc}</div>` : ''}
          </div>
          <div class="music-right">
            <canvas class="visualizer" data-i="${index}" width="120" height="36"></canvas>
            <div class="music-icon" data-i="${index}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <polygon points="5,3 19,12 5,21" fill="currentColor"/>
              </svg>
            </div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.music-card').forEach(card => {
        const idx = parseInt(card.dataset.index);
        const icon = card.querySelector(`.music-icon[data-i="${idx}"]`);
        const canvas = card.querySelector(`.visualizer[data-i="${idx}"]`);

        // 3D tilt effect
        card.addEventListener('mousedown', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (centerY - y) / 10;
          const rotateY = (x - centerX) / 10;
          card.style.transform = `perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(0.98)`;
        });

        card.addEventListener('mouseup', () => {
          card.style.transform = 'perspective(500px) rotateX(0) rotateY(0) scale(1)';
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(500px) rotateX(0) rotateY(0) scale(1)';
        });

        function togglePlay(e) {
          const audioSrc = card.dataset.audio;

          if (currentAudio && currentIndex === idx) {
            if (currentAudio.paused) {
              currentAudio.play();
              icon.classList.add('hidden');
              icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>';
              if (analyzer) drawVisualizer(canvas, analyzer);
            } else {
              currentAudio.pause();
              icon.classList.remove('hidden');
              icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>';
              if (animationId) cancelAnimationFrame(animationId);
            }
          } else {
            if (currentAudio) {
              currentAudio.pause();
              currentAudio = null;
              if (animationId) cancelAnimationFrame(animationId);
            }

            currentAudio = new Audio(audioSrc);
            currentAudio.crossOrigin = 'anonymous';
            currentAudio.loop = true;
            currentAudio.play();
            currentIndex = idx;
            icon.classList.add('hidden');
            icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>';

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioContext.createAnalyser();
            const source = audioContext.createMediaElementSource(currentAudio);
            source.connect(analyzer);
            analyzer.connect(audioContext.destination);
            analyzer.fftSize = 64;

            drawVisualizer(canvas, analyzer);

            currentAudio.onended = () => {
              icon.classList.remove('hidden');
              icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>';
              if (animationId) cancelAnimationFrame(animationId);
              currentAudio = null;
              currentIndex = -1;
            };
          }
        }

        card.addEventListener('click', togglePlay);

        card.addEventListener('mouseenter', () => {
          if (currentAudio && currentIndex === idx && !currentAudio.paused) {
            icon.classList.remove('hidden');
          }
        });

        card.addEventListener('mouseleave', () => {
          if (currentAudio && currentIndex === idx && !currentAudio.paused) {
            icon.classList.add('hidden');
          }
        });
      });
    }

    function drawVisualizer(canvas, analyzer) {
      const ctx = canvas.getContext('2d');
      const bufferLength = analyzer.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      function draw() {
        animationId = requestAnimationFrame(draw);
        analyzer.getByteFrequencyData(dataArray);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const barWidth = canvas.width / bufferLength;
        const gap = 1;
        const radius = 2;

        for (let i = 0; i < bufferLength; i++) {
          const barHeight = (dataArray[i] / 255) * canvas.height;
          const x = i * (barWidth + gap);
          const y = canvas.height - barHeight;

          ctx.beginPath();
          ctx.roundRect(x, y, barWidth, barHeight, radius);
          ctx.fillStyle = '#2563EB';
          ctx.fill();
        }
      }
      draw();
    }

    renderCards();
  </script>
</body>
</html>
